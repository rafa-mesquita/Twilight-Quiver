name: Deploy to GitHub Pages

# Auto-export do Godot pra GitHub Pages a cada push pro main + botão manual.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancela deploys em fila — só o último push importa.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot install + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Download Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot
          rm godot.zip

      - name: Download export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"
          rm -rf templates templates.tpz

      - name: Verify Godot install
        run: |
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/" | head -5
          ./godot --version

      - name: Import project (resource detection)
        run: |
          # Roda --import 2x: 1ª pra detectar, 2ª pra importar com refs já indexadas.
          ./godot --headless --import || true
          ./godot --headless --import || true

      - name: Export Web build
        run: |
          mkdir -p build/web
          ./godot --headless --export-release "Web" build/web/index.html
          ls -la build/web/

      - name: Export Windows build
        run: |
          mkdir -p build/windows
          ./godot --headless --export-release "Windows Desktop" build/windows/twilight-quiver.exe
          ls -la build/windows/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-ativa Pages com source "GitHub Actions" se ainda não tá configurado.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # Build Windows fica disponível como artifact baixável na página do run
      # (Actions → último run → Artifacts → twilight-quiver-windows).
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: twilight-quiver-windows
          path: build/windows/
          if-no-files-found: error
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
